name: Deploy Pages

# Triggered when the Release workflow completes successfully.
# workflow_run ALWAYS executes on the default branch (main), so
# GITHUB_REF is refs/heads/main — this passes the github-pages
# environment protection rules that block tag/release-triggered workflows.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm install

      - name: Set version from release tag
        run: node scripts/set-version.js ${{ github.event.workflow_run.head_branch }}

      - name: Build single-file bundle
        env:
          PEARTREE_VERSION_TAG: ${{ github.event.workflow_run.head_branch }}
        run: npm run bundle

      - name: Assemble site
        run: |
          mkdir -p _site/data _site/img _site/logo _site/manual/images
          cp peartree/index.html                     _site/index.html
          cp CNAME                                   _site/CNAME
          cp dist/peartree.bundle.min.js             _site/peartree.bundle.min.js
          cp peartree/img/peartree.svg               _site/img/peartree.svg
          cp peartree/img/peartree.png               _site/img/peartree.png
          cp logo/peartree.svg                       _site/logo/peartree.svg
          cp logo/peartree.png                       _site/logo/peartree.png
          cp peartree/data/ebov.tree                 _site/data/ebov.tree
          cp peartree/data/VARV.tree                 _site/data/VARV.tree
          cp peartree/data/large_tree.tree           _site/data/large_tree.tree
          cp peartree/data/SARS-CoV-2_15K.tree      _site/data/SARS-CoV-2_15K.tree
          cp data/ebov.csv                           _site/data/ebov.csv
          cp data/measles_genome_tree.nexus          _site/data/measles_genome_tree.nexus
          cp peartree/about.md                       _site/about.md
          cp peartree/help.md                        _site/help.md
          cp peartree/manual/manual.md               _site/manual/manual.md
          cp -r peartree/manual/images/.             _site/manual/images/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
