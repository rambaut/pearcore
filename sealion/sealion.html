<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sealion</title>

    <!-- CSS: bootstrap → pearcore → app styles -->
    <link rel="stylesheet" href="../pearcore/vendor/bootstrap.min-artic.css">
    <link rel="stylesheet" href="../pearcore/vendor/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../pearcore/css/pearcore.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sealion.css">
    <link rel="stylesheet" href="css/docs.css">

    <!-- Marked.js for markdown rendering -->
    <script src="../pearcore/vendor/marked.min.js"></script>

    <!-- Import map: resolve @artic-network/pearcore/* to ../pearcore/js/* -->
    <script type="importmap">
      { "imports": { "@artic-network/pearcore/": "../pearcore/js/" } }
    </script>
  </head>
  <body>
    <!-- Replaced at load time by sealion-ui.js buildSealionAppHTML() -->
    <div id="app-html-host"></div>

    <!-- Bootstrap JS Bundle (includes Popper) — vendored -->
    <script src="../pearcore/vendor/bootstrap.bundle.min.js"></script>

    <!-- UI builders (classic scripts — pearcore-ui.js first, then app-specific) -->
    <script src="../pearcore/js/pearcore-ui.js"></script>
    <script src="js/sealion-ui.js"></script>

    <!-- Sealion-specific non-module scripts -->
    <script defer src="js/alignment.js"></script>
    <script type="module" src="js/sealionviewer.js"></script>

    <!-- App entry point (ES module) -->
    <script type="module" src="js/sealion.js"></script>
  </body>
</html>
